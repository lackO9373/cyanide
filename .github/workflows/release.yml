name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build IPA with release script
        run: VERSION="${{ steps.tag.outputs.version }}" ./scripts/release.sh

      - name: Verify IPA exists
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSIONED_IPA="build/Cyanide-${VERSION}.ipa"
          LINK_IPA="build/Cyanide.ipa"
          if [ ! -f "$VERSIONED_IPA" ]; then
            echo "error: $VERSIONED_IPA not found" >&2
            exit 1
          fi
          if [ ! -f "$LINK_IPA" ]; then
            echo "error: $LINK_IPA not found" >&2
            exit 1
          fi
          ls -lh "$VERSIONED_IPA" "$LINK_IPA"

      - name: Prepare release asset
        run: |
          cp build/Cyanide.ipa build/cyanidex.ipa
          ls -lh build/cyanidex.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cyanide ${{ github.ref_name }}
          files: build/cyanidex.ipa
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
